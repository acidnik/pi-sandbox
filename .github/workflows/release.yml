name: Release

# Triggered when a GitHub release is published. The release tag drives the
# package.json version (e.g. tag "v0.2.3" or "0.2.3" -> version "0.2.3").
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    # Required for both npm provenance attestation AND OIDC trusted publishing.
    # Without `id-token: write` the runner can't request the OIDC token that
    # npm uses to verify the workflow identity, and provenance signing fails.
    permissions:
      id-token: write  # Essential for OIDC authentication
      contents: read   # Standard for checking out code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for `npm publish`)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Set version from release tag
        run: |
          # Strip a leading "v" so both v0.2.3 and 0.2.3 tags work.
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' is not a valid semver"
            exit 1
          fi
          echo "Setting package.json version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --provenance  # Provenance is recommended with OIDC
        # Authentication is handled by OIDC trusted publishing (see the
        # `permissions: id-token: write` block above and the trusted-publisher
        # config on npm). `access: public` comes from publishConfig in
        # package.json, so no flag is needed here.
