name: Release

# Triggered when a GitHub release is published. The release tag drives the
# package.json version (e.g. tag "v0.2.3" or "0.2.3" -> version "0.2.3").
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    # `id-token: write` is required for npm provenance attestation.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for `npm publish`)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Set version from release tag
        run: |
          # Strip a leading "v" so both v0.2.3 and 0.2.3 tags work.
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' is not a valid semver"
            exit 1
          fi
          echo "Setting package.json version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
